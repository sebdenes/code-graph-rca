<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Halo — social preview</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    /*
     * Halo · social preview, 1200×630.
     * The metaphor rendered literally: the product puts a halo on the
     * bug, so the social card puts a halo on the bug. No wordy subtitle,
     * no purple gradient, no emoji icon. Brand colors are pulled from
     * the actual styles.ts shipping in the package — not invented.
     */
    :root {
      --bg-top: #0a0f1f;
      --bg-bottom: #040713;
      --ink: #f5f5f5;
      --ink-muted: rgba(245, 245, 245, 0.55);
      --ink-faint: rgba(245, 245, 245, 0.35);

      --node-function: #7aa8ff;
      --node-method: #c084fc;
      --node-class: #ffb547;
      --node-file: #5cd5ff;
      --node-folder: #9b6dff;
      --node-const: #5dd699;
      --node-phantom: #5a5e74;

      --halo-red: #ff5c6a;
      --edge: #7aa8ff;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 1200px; height: 630px; overflow: hidden; }
    body {
      background:
        radial-gradient(1200px 800px at 25% 60%, rgba(122, 168, 255, 0.06), transparent 60%),
        linear-gradient(180deg, var(--bg-top) 0%, var(--bg-bottom) 100%);
      color: var(--ink);
      font-family: "Newsreader", Georgia, serif;
      position: relative;
    }

    /* Faint starfield — radial gradients masked across the canvas, low alpha. */
    body::before {
      content: "";
      position: absolute;
      inset: 0;
      background-image:
        radial-gradient(1px 1px at 23% 14%, rgba(255,255,255,0.4), transparent),
        radial-gradient(1px 1px at 67% 22%, rgba(255,255,255,0.25), transparent),
        radial-gradient(1px 1px at 12% 78%, rgba(255,255,255,0.35), transparent),
        radial-gradient(1px 1px at 88% 67%, rgba(255,255,255,0.25), transparent),
        radial-gradient(1px 1px at 39% 89%, rgba(255,255,255,0.3), transparent),
        radial-gradient(1px 1px at 53% 41%, rgba(255,255,255,0.18), transparent),
        radial-gradient(1px 1px at 71% 84%, rgba(255,255,255,0.2), transparent),
        radial-gradient(1px 1px at 9% 36%, rgba(255,255,255,0.22), transparent),
        radial-gradient(1px 1px at 78% 11%, rgba(255,255,255,0.32), transparent),
        radial-gradient(1px 1px at 33% 64%, rgba(255,255,255,0.18), transparent),
        radial-gradient(1px 1px at 96% 35%, rgba(255,255,255,0.22), transparent),
        radial-gradient(1px 1px at 19% 53%, rgba(255,255,255,0.18), transparent);
      pointer-events: none;
      opacity: 0.55;
    }

    .stage {
      position: relative;
      width: 100%;
      height: 100%;
      display: grid;
      grid-template-columns: 580px 1fr;
    }

    /* ---------- LEFT: constellation cluster ---------- */

    .cluster {
      position: relative;
      width: 580px;
      height: 630px;
    }

    /* SVG holds edges + nodes. Inline SVG preserves crispness at retina. */
    .cluster svg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    /* The "lit bug" — radial halo behind the focal node.
     * Sits behind the SVG so it reads as ambient glow, not a separate ring. */
    .halo-glow {
      position: absolute;
      width: 240px;
      height: 240px;
      border-radius: 50%;
      background: radial-gradient(closest-side,
        rgba(255, 92, 106, 0.55) 0%,
        rgba(255, 92, 106, 0.22) 35%,
        rgba(255, 92, 106, 0.05) 70%,
        transparent 100%);
      filter: blur(2px);
      pointer-events: none;
    }
    .halo-glow.focal { left: 248px; top: 256px; }   /* centred over node "login" */

    /* Node labels — small mono. Only label a handful so the cluster reads
     * as code without becoming a wall of text. */
    .node-label {
      position: absolute;
      font-family: "JetBrains Mono", ui-monospace, monospace;
      font-size: 10.5px;
      letter-spacing: 0.02em;
      color: rgba(245, 245, 245, 0.7);
      white-space: nowrap;
      text-shadow: 0 0 6px rgba(0,0,0,0.5);
    }

    /* ---------- RIGHT: wordmark + tagline ---------- */

    .text {
      padding: 96px 88px 76px 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 36px;
    }

    .wordmark {
      font-family: "Newsreader", Georgia, serif;
      font-style: italic;
      font-weight: 400;
      font-size: 188px;
      line-height: 0.86;
      letter-spacing: -0.04em;
      color: var(--ink);
    }

    /* Subtle accent dot positioned as a "halo" to the right of the H —
     * echoes the metaphor without literal duplication. */
    .wordmark .dot {
      display: inline-block;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: var(--halo-red);
      box-shadow:
        0 0 0 4px rgba(255, 92, 106, 0.18),
        0 0 24px rgba(255, 92, 106, 0.55);
      margin-left: 8px;
      vertical-align: super;
      transform: translateY(-44px);
    }

    .tagline {
      font-family: "JetBrains Mono", ui-monospace, monospace;
      font-weight: 400;
      font-size: 22px;
      line-height: 1.4;
      letter-spacing: 0.005em;
      color: rgba(245, 245, 245, 0.86);
      max-width: 540px;
      text-wrap: balance;
    }

    .tagline em {
      color: var(--halo-red);
      font-style: normal;
      font-weight: 500;
    }

    .meta {
      font-family: "JetBrains Mono", ui-monospace, monospace;
      font-size: 13px;
      line-height: 1.5;
      letter-spacing: 0.04em;
      color: var(--ink-faint);
      text-transform: uppercase;
    }

    .meta a { color: inherit; text-decoration: none; }
    .meta strong { color: rgba(245, 245, 245, 0.7); font-weight: 500; }

    /* ---------- bottom-bar (npm row) ---------- */

    .bottom {
      position: absolute;
      left: 56px;
      bottom: 30px;
      font-family: "JetBrains Mono", ui-monospace, monospace;
      font-size: 12px;
      letter-spacing: 0.06em;
      color: var(--ink-faint);
      text-transform: uppercase;
    }

  </style>
</head>
<body>
  <div class="stage">

    <!-- LEFT: cluster -->
    <div class="cluster">

      <!-- Halo glow behind the focal node -->
      <div class="halo-glow focal"></div>

      <!-- SVG: edges as faint cyan lines, then nodes as small filled circles.
           Coordinates are hand-placed to evoke a force-directed cluster
           without being algorithmically generated — designer's choice. -->
      <svg viewBox="0 0 580 630" xmlns="http://www.w3.org/2000/svg">

        <!-- Edge layer -->
        <g stroke="var(--edge)" stroke-opacity="0.18" stroke-width="1" fill="none">
          <!-- spokes radiating from the focal -->
          <line x1="368" y1="376" x2="232" y2="298"/>   <!-- → verifyPassword -->
          <line x1="368" y1="376" x2="448" y2="312"/>   <!-- → issueToken -->
          <line x1="368" y1="376" x2="296" y2="448"/>   <!-- → AuthError -->
          <line x1="368" y1="376" x2="436" y2="468"/>   <!-- → Session -->
          <line x1="368" y1="376" x2="184" y2="384"/>   <!-- → Session.touch -->
          <line x1="368" y1="376" x2="128" y2="208"/>   <!-- → handleLoginRoute -->
          <line x1="368" y1="376" x2="496" y2="208"/>   <!-- → registerRoutes -->
          <line x1="368" y1="376" x2="80" y2="476"/>    <!-- → loginFromCli -->
          <!-- secondary edges -->
          <line x1="232" y1="298" x2="128" y2="208" stroke-opacity="0.12"/>
          <line x1="448" y1="312" x2="496" y2="208" stroke-opacity="0.12"/>
          <line x1="296" y1="448" x2="436" y2="468" stroke-opacity="0.10"/>
          <line x1="184" y1="384" x2="80" y2="476" stroke-opacity="0.12"/>
          <!-- ghost / unresolved (dashed) -->
          <line x1="368" y1="376" x2="540" y2="412" stroke-opacity="0.16" stroke-dasharray="3 3"/>
          <line x1="232" y1="298" x2="316" y2="172" stroke-opacity="0.16" stroke-dasharray="3 3"/>
        </g>

        <!-- Node layer. Sizes vary slightly to reflect LOC. -->
        <g>
          <!-- focal: login (lit) -->
          <circle cx="368" cy="376" r="9" fill="var(--node-function)"/>
          <circle cx="368" cy="376" r="13" fill="none" stroke="var(--halo-red)" stroke-width="2" stroke-opacity="0.85"/>

          <!-- callees -->
          <circle cx="232" cy="298" r="6.5" fill="var(--node-function)"/>
          <circle cx="448" cy="312" r="6.5" fill="var(--node-function)"/>

          <!-- classes -->
          <circle cx="296" cy="448" r="7" fill="var(--node-class)"/>
          <circle cx="436" cy="468" r="7.5" fill="var(--node-class)"/>

          <!-- methods -->
          <circle cx="184" cy="384" r="5.5" fill="var(--node-method)"/>

          <!-- callers -->
          <circle cx="128" cy="208" r="6.5" fill="var(--node-function)"/>
          <circle cx="496" cy="208" r="6" fill="var(--node-function)"/>
          <circle cx="80" cy="476" r="6" fill="var(--node-function)"/>

          <!-- files in the periphery -->
          <circle cx="60" cy="280" r="5" fill="var(--node-file)"/>
          <circle cx="540" cy="120" r="5" fill="var(--node-file)"/>
          <circle cx="380" cy="100" r="4.5" fill="var(--node-file)"/>

          <!-- consts -->
          <circle cx="220" cy="540" r="4.5" fill="var(--node-const)"/>
          <circle cx="500" cy="556" r="4.5" fill="var(--node-const)"/>

          <!-- phantoms (unresolved targets) -->
          <circle cx="540" cy="412" r="3.5" fill="var(--node-phantom)"/>
          <circle cx="316" cy="172" r="3.5" fill="var(--node-phantom)"/>

          <!-- a few far-out stars (folder dots) -->
          <circle cx="36" cy="52" r="3" fill="var(--node-folder)" opacity="0.7"/>
          <circle cx="552" cy="52" r="3" fill="var(--node-folder)" opacity="0.7"/>
          <circle cx="48" cy="592" r="3" fill="var(--node-folder)" opacity="0.6"/>
        </g>
      </svg>

      <!-- Selective labels — only the focal + 4 satellites — to read as
           code without becoming a wall of text. -->
      <div class="node-label" style="left: 388px; top: 384px;">login</div>
      <div class="node-label" style="left: 132px; top: 282px;">verifyPassword</div>
      <div class="node-label" style="left: 460px; top: 296px;">issueToken</div>
      <div class="node-label" style="left: 304px; top: 456px;">AuthError</div>
      <div class="node-label" style="left: 36px; top: 192px; opacity: 0.55;">handleLoginRoute</div>
    </div>

    <!-- RIGHT: wordmark + tagline -->
    <div class="text">
      <div class="wordmark">Halo<span class="dot"></span></div>
      <div class="tagline">
        Lights up <em>the bug</em>.<br>
        RCA infrastructure for AI&#8209;built code.
      </div>
      <div class="meta">
        npm · code-graph-rca &nbsp;·&nbsp; MCP-native &nbsp;·&nbsp; MIT
      </div>
    </div>

  </div>

  <div class="bottom">github.com/sebdenes/code-graph-rca</div>
</body>
</html>
