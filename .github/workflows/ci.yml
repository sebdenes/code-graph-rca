# Real CI — install, build, test all 3 packages on every PR + push to main.
# The cgrca.yml workflow runs the cgrca PR-review bot as a separate "check"
# (descriptive, not a real test run). This workflow is the actual gate.
name: ci

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: build + test (node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ["20", "22"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - name: Install
        # npm/cli#4828: `npm ci` strips platform-specific optional deps when
        # the lockfile was generated on a different OS. vite/rollup,
        # rolldown, lightningcss, and @tailwindcss/oxide all ship native
        # bindings as optionals, so `npm ci` on a Linux runner from a macOS
        # lockfile loses every one of them, breaking the UI build with
        # "Cannot find module '...linux-x64-gnu...'" errors. The npm error
        # message itself recommends removing node_modules + package-lock and
        # reinstalling — do exactly that. Lockfile is still committed for
        # reproducibility on the install-author's platform; CI rebuilds.
        run: |
          rm -rf node_modules package-lock.json
          npm install --no-audit --no-fund --include=optional --legacy-peer-deps
      - name: Build (core)
        run: npm -w packages/core run build
      - name: Build (ui)
        run: npm -w packages/ui run build
      - name: Build (github-app)
        run: npm -w packages/github-app run build
      - name: Test (core)
        run: npm -w packages/core test
      - name: Test (ui)
        run: npm -w packages/ui test
      - name: Test (github-app)
        run: npm -w packages/github-app test

  typecheck:
    name: typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - name: Install
        # Same npm/cli#4828 workaround as the build-test job — lightningcss
        # / rollup native bindings need to land for the UI typecheck path
        # too (vite.config.ts is included in the typecheck program).
        run: |
          rm -rf node_modules package-lock.json
          npm install --no-audit --no-fund --include=optional --legacy-peer-deps
      - name: Build (core)
        # UI tsconfig references `code-graph-rca` (the core package); without
        # building core first, every UI tsc run errors with TS2307.
        run: npm -w packages/core run build
      - name: Typecheck (ui)
        run: npm -w packages/ui run typecheck
