# Real CI — install, build, test all 3 packages on every PR + push to main.
# The cgrca.yml workflow runs the cgrca PR-review bot as a separate "check"
# (descriptive, not a real test run). This workflow is the actual gate.
name: ci

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: build + test (node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ["20", "22"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - name: Install
        # `npm ci` strips platform-specific optional deps on Linux runners
        # for packages installed from a different platform's lockfile —
        # vite 8 → rolldown native bindings hit npm/cli#4828, which surfaces
        # as "Cannot find module '@rolldown/binding-linux-x64-gnu'" during
        # the UI build. Force-install missing platform optionals after the
        # deterministic `npm ci` so we don't regress lockfile fidelity.
        run: |
          npm ci
          npm install --no-save --include=optional --force \
            @rolldown/binding-linux-x64-gnu \
            @tailwindcss/oxide-linux-x64-gnu \
            || true
      - name: Build (core)
        run: npm -w packages/core run build
      - name: Build (ui)
        run: npm -w packages/ui run build
      - name: Build (github-app)
        run: npm -w packages/github-app run build
      - name: Test (core)
        run: npm -w packages/core test
      - name: Test (ui)
        run: npm -w packages/ui test
      - name: Test (github-app)
        run: npm -w packages/github-app test

  typecheck:
    name: typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - name: Install
        run: npm ci
      - name: Build (core)
        # UI tsconfig references `code-graph-rca` (the core package); without
        # building core first, every UI tsc run errors with TS2307.
        run: npm -w packages/core run build
      - name: Typecheck (ui)
        run: npm -w packages/ui run typecheck
